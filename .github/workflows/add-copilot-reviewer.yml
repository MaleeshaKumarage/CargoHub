# Add GitHub Copilot as reviewer on every new PR
name: Add Copilot Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  add-reviewer:
    runs-on: ubuntu-latest
    steps:
      - name: Add Copilot as reviewer
        run: gh pr edit "${{ github.event.pull_request.number }}" --add-reviewer "@copilot"
        env:
          GH_TOKEN: ${{ github.token }}
