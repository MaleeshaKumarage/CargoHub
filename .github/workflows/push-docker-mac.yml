# One pipeline: push code → build & push image to Docker Hub → deploy on Mac Mini → restart ngrok.
#
# Secrets (repo → Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  — required for build
#   NGROK_AUTHTOKEN                      — optional; without it, ngrok step is skipped
#   BOOTSTRAP__SECRET, JWT__SIGNING_KEY, CORS__PORTAL_ORIGIN — optional for compose
#
# Mac Mini: install Docker, ngrok, self-hosted runner; runner user in `docker` group.

name: Docker Hub + Mac deploy + ngrok

on:
  push:
    branches: [main, master, development]
  workflow_dispatch:

concurrency:
  group: docker-mac-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cargohub
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push (all-in-one)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-on-mac:
    name: Deploy on Mac + smoke + ngrok
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Pull latest image and restart stack
        env:
          Bootstrap__Secret: ${{ secrets.BOOTSTRAP__SECRET }}
          Jwt__SigningKey: ${{ secrets.JWT__SIGNING_KEY }}
          CORS__PORTAL_ORIGIN: ${{ secrets.CORS__PORTAL_ORIGIN }}
        run: |
          set -e
          COMPOSE="docker compose -f docker-compose.one.yml"
          if [ -f "$HOME/.cargohub.env" ]; then
            COMPOSE="$COMPOSE --env-file $HOME/.cargohub.env"
          fi

          echo "Stopping existing stack and freeing ports 3000 / 8080..."
          $COMPOSE down --remove-orphans 2>/dev/null || true
          docker rm -f cargohub 2>/dev/null || true
          # Remove any container still bound to host ports (stale manual runs, duplicate stacks)
          for port in 8080 3000; do
            for id in $(docker ps -q --filter "publish=$port" 2>/dev/null); do
              echo "Removing container $id (was using port $port)"
              docker rm -f "$id" || true
            done
          done

          $COMPOSE pull
          $COMPOSE up -d --force-recreate --remove-orphans

      - name: Prune old images (optional)
        run: docker image prune -f || true

      - name: Smoke test (API + portal on localhost)
        run: |
          set -e
          echo "Waiting for Postgres, API, and Next.js..."
          sleep 20
          curl -sfS --retry 20 --retry-delay 5 --retry-all-errors \
            "http://localhost:8080/api/v1/health_"
          curl -sfS --retry 20 --retry-delay 5 --retry-all-errors \
            -o /dev/null "http://localhost:3000/"
          echo "Smoke tests passed."

      - name: Restart ngrok (public URLs)
        id: ngrok
        continue-on-error: true
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          set -e
          if ! command -v ngrok >/dev/null 2>&1; then
            echo "::warning::ngrok is not installed on this runner. Install: https://ngrok.com/download"
            exit 0
          fi
          if [ -z "$NGROK_AUTHTOKEN" ]; then
            echo "::notice::Set NGROK_AUTHTOKEN in repo secrets to enable public tunnels after each deploy."
            exit 0
          fi
          ngrok config add-authtoken "$NGROK_AUTHTOKEN" 2>/dev/null || true
          pkill -f '[n]grok' || true
          sleep 2
          nohup ngrok start --all --config "$GITHUB_WORKSPACE/ngrok.yml" >> /tmp/ngrok-cargohub.log 2>&1 &
          sleep 5
          TUNNELS=$(curl -fsS http://127.0.0.1:4040/api/tunnels 2>/dev/null || echo "{}")
          echo "$TUNNELS" | head -c 4000
          echo ""
          echo "## ngrok tunnels" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$TUNNELS" | head -c 8000 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Log: /tmp/ngrok-cargohub.log"
