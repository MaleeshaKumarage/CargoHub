# PR validation: build and test on every pull request
# Runs on GitHub-hosted runners — no server needed
#
# To block direct commits: Settings → Branches → Add rule for main & development
#   - Require a pull request before merging
#   - Require status checks (this workflow) to pass

name: PR Validation

on:
  pull_request:
    branches: [main, master, development]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CargoHub.Backend.sln

      - name: Build
        run: dotnet build CargoHub.Backend.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test CargoHub.Backend.sln --no-build --configuration Release --verbosity normal
