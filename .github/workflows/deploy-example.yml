# Legacy example (ubuntu-latest + custom deploy step).
# For Mac Mini + Docker + ngrok, use: docker-build-push.yml + docker-deploy-mac.yml.

name: Deploy (Example)

on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cargohub-api .

      - name: Deploy (example - replace with your deployment step)
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ConnectionStrings__DefaultConnection: ${{ secrets.CONNECTION_STRINGS__DEFAULT_CONNECTION }}
          Bootstrap__Secret: ${{ secrets.BOOTSTRAP__SECRET }}
          Jwt__SigningKey: ${{ secrets.JWT__SIGNING_KEY }}
          Cors__PortalOrigin: ${{ secrets.CORS__PORTAL_ORIGIN }}
        run: |
          echo "Replace with your cloud deploy, or use docker-build-push.yml + docker-deploy-mac.yml for Docker + ngrok on your own machine."
