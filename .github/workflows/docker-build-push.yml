# Part 1 of 2: build & push only (Ubuntu). Fast; duplicate runs on same branch cancel.
# Part 2: docker-deploy-mac.yml runs on the self-hosted runner after this workflow succeeds.
#
# Jobs:
#   1. build-image        — Dockerfile.all-in-one → Docker Hub
#   2. notify-build-failure — issue if build fails (Ubuntu; always runs after job 1)

name: Docker — build & push image

on:
  push:
    branches: [main, master, development]
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & push (Ubuntu) ───
  build-image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      # Registry digest when pushed; local image ID (sha256:…) when build-only — build-push-action does not set digest with push:false.
      image_digest: ${{ steps.push.outputs.digest || steps.local_digest.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Without both secrets, `docker/login-action` fails immediately — this keeps CI green while still validating the Dockerfile.
      - name: Detect Docker Hub credentials
        id: hub
        run: |
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN are not both set — building the image only (no registry push). Add repository secrets to push to Docker Hub."
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.hub.outputs.enabled == '1'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        if: steps.hub.outputs.enabled == '1'
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/cargohub
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push (Dockerfile.all-in-one)
        id: push
        if: steps.hub.outputs.enabled == '1'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build image only (no Docker Hub push)
        id: build_only
        if: steps.hub.outputs.enabled != '1'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          push: false
          load: true
          tags: cargohub:ci-${{ github.sha }}
          build-args: |
            BUILD_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Local image ID (no registry digest without push)
        id: local_digest
        if: steps.hub.outputs.enabled != '1'
        run: |
          img="cargohub:ci-${{ github.sha }}"
          digest=$(docker inspect --format='{{.Id}}' "$img")
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

  # ─── Notify (only if build failed) ───
  notify-build-failure:
    name: Open issue on build failure
    needs: [build-image]
    if: ${{ always() && needs.build-image.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const ref = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[CI] Docker build/push failed — ${ref} (run ${context.runId})`;
            const body = [
              '### Failed job',
              '- **build-image** (Docker build/push on Ubuntu)',
              '',
              `| **Branch** | \`${ref}\` |`,
              `| **Commit** | \`${context.sha}\` |`,
              '',
              `**[View run logs →](${runUrl})**`,
              '',
              '_Deploy to Mac did not run (build failed)._',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
