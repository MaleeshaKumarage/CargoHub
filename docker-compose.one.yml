# Single image: db + api + portal. One command: docker compose -f docker-compose.one.yml up -d
# Portal: http://localhost:3000  |  API: http://localhost:8080

services:
  cargohub:
    image: maleesha404/cargohub:latest
    container_name: cargohub
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - cargohub_data:/var/lib/postgresql/data
    environment:
      Bootstrap__Secret: ${Bootstrap__Secret:-SuperAdminBootstrapSecret}
      Jwt__SigningKey: ${Jwt__SigningKey:-DemoJwtKey-ChangeMe-AtLeast32Chars}
      # For public demo (e.g. ngrok): set to your portal URL, e.g. https://xxx.ngrok-free.app
      Cors__PortalOrigin: ${CORS__PORTAL_ORIGIN:-http://localhost:3000}

volumes:
  cargohub_data:
