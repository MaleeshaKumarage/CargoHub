# Single image: db + api + portal + nginx. One command: docker compose -f docker-compose.one.yml up -d
# Direct: http://localhost:3000 (portal), http://localhost:8080 (API)
# Public demo: ngrok tunnels to **8888** (nginx: UI + /api). Set CORS__PORTAL_ORIGIN to your https ngrok URL.

services:
  cargohub:
    restart: unless-stopped
    image: maleesha404/cargohub:latest
    # CI runs `compose pull` before `down` so deploy downtime excludes pull; `up` uses cached layers.
    # For a manual fresh image: `docker compose pull && docker compose up -d`
    pull_policy: missing
    container_name: cargohub
    ports:
      - "8888:8888"
      - "3000:3000"
      - "8080:8080"
      # ngrok local API / dashboard inside container is :4040; map to 14040 on host to avoid
      # "address already in use" when host ngrok or another tool already binds :4040.
      - "14040:4040"
    volumes:
      - cargohub_data:/var/lib/postgresql/data
    environment:
      Bootstrap__Secret: ${Bootstrap__Secret:-SuperAdminBootstrapSecret}
      Jwt__SigningKey: ${Jwt__SigningKey:-DemoJwtKey-ChangeMe-AtLeast32Chars}
      # For public demo (e.g. ngrok): set to your portal URL, e.g. https://xxx.ngrok-free.app
      Cors__PortalOrigin: ${CORS__PORTAL_ORIGIN:-http://localhost:3000}
      # Optional: starts in-container ngrok (token from GitHub Actions secret or .env)
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      # SMTP (set via GitHub Secrets synced from .env, or local compose --env-file)
      Smtp__Host: ${Smtp__Host:-}
      Smtp__Port: ${Smtp__Port:-587}
      Smtp__UseSsl: ${Smtp__UseSsl:-true}
      Smtp__UserName: ${Smtp__UserName:-}
      Smtp__Password: ${Smtp__Password:-}
      Smtp__FromAddress: ${Smtp__FromAddress:-}

volumes:
  cargohub_data:
