# Run from pre-built Docker Hub images (no build).
# Images: maleesha404/cargohub-api, maleesha404/cargohub-portal
# One command: docker compose -f docker-compose.pull.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: cargohub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portal
    ports:
      - "5433:5432"
    volumes:
      - cargohub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    image: maleesha404/cargohub-api:latest
    container_name: cargohub-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=portal;Username=postgres;Password=postgres
      Cors__PortalOrigin: http://localhost:3000
      Bootstrap__Secret: ${Bootstrap__Secret:-SuperAdminBootstrapSecret}
      Jwt__SigningKey: ${Jwt__SigningKey:-DemoJwtKey-ChangeMe-AtLeast32Chars}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  portal:
    image: maleesha404/cargohub-portal:latest
    container_name: cargohub-portal
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  cargohub_pgdata:
